#version: '3.8'
services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - '5434:5432'

  redis:
    image: redis:7
    ports:
      - '6381:6379'

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - '4000:4000'
    command: sh -c "npx prisma generate && npm run dev"

  web:
    build:
      context: .
      dockerfile: ./web/Dockerfile
    env_file:
      - .env # Cargar todas las variables desde .env
      - ./web/.env.local
    depends_on:
      - backend
    ports:
      - '3001:3001'
    command: sh -c "npm run dev"

  worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    command: sh -c "npx prisma generate && npm run build && node dist/index.js"

volumes:
  dbdata:
